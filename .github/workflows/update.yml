name: Update Nhap Kho Dashboard

on:
  schedule:
    # Gio VN = UTC+7. Chay 8:00-10:00 VN (T2-T7), moi 30 phut = 5 lan/ngay
    - cron: '0,30 1,2,3 * * 1-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.email "condor-bot@condor.vn"
          git config user.name "Condor Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto update $(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d %H:%M') ICT"
          git push
