name: Update Nhap Kho Dashboard

on:
  schedule:
    # Gio Viet Nam = UTC+7
    # Khung gio: 08:00 - 17:00 VN, Thu Hai - Thu Bay (Mon-Sat)
    # Cron dung gio UTC:
    - cron: '0,30 1,2,3,4,5,6,7,8,9 * * 1-6'  # 08:00 - 16:30 VN (moi 30 phut)
    - cron: '0 10 * * 1-6'                       # 17:00 VN (lan cuoi trong ngay)
  workflow_dispatch:  # Cho phep chay thu cong bat cu luc nao

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.email "condor-bot@condor.vn"
          git config user.name "Condor Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto update $(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d %H:%M') ICT"
          git push
